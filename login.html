<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Authentication</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container" id="container">

  <!-- LOGIN FORM -->
  <div class="form-container login-container">
    <form id="loginForm">
      <div class="icon-circle">
        <i class="fa-solid fa-user"></i>
      </div>
      <h2>MY ACCOUNT</h2>

      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Password" required>

      <button type="submit" class="primary-btn">SIGN IN</button>

      <p class="switch-text">CREATE ACCOUNT</p>
    </form>
  </div>

  <!-- REGISTER FORM -->
  <div class="form-container register-container">
    <form>
      <h2>Create Account</h2>

      <input type="text" placeholder="Name" required>
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Password" required>

      <button type="submit" class="primary-btn">SIGN UP</button>

      <p class="or-text">Or login with</p>

      <button type="button" class="google-btn">
        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
        Continue with Google
      </button>
    </form>
  </div>

  <!-- OVERLAY -->
  <div class="overlay-container">
    <div class="overlay">

      <div class="overlay-panel left-panel">
        <h2>Welcome Back!</h2>
        <p>To keep connected with us please login with your personal info</p>
        <button class="ghost" id="login">Sign In</button>
      </div>

      <div class="overlay-panel right-panel">
        <h2>Hello, Friend!</h2>
        <p>Enter your personal details and start your journey</p>
        <button class="ghost" id="register">Sign Up</button>
      </div>

    </div>
  </div>

</div>

<script src="auth.js"></script>
</body>
</html>
