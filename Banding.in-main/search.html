<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Banding.in — Bandingkan Harga</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <style>
    /* Reset & Variabel */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --text-dark: #1e2d3a;
      --text-mid: #3a5068;
      --text-soft: #5a7a90;
      --blue: #4a7fc1;
      --teal: #5bbcb8;
    }
    html, body { height: 100%; font-family: 'DM Sans', sans-serif; overflow: hidden; }

    /* Background */
    .bg { position: fixed; inset: 0; z-index: 0; background: linear-gradient(135deg, #c8dce8 0%, #a0c8d4 40%, #88bcc8 70%, #7ab0c4 100%); }
    .bg::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 700px 500px at 20% 80%, rgba(91,188,184,.28) 0%, transparent 70%), radial-gradient(ellipse 500px 400px at 80% 20%, rgba(74,127,193,.22) 0%, transparent 70%), radial-gradient(ellipse 400px 300px at 60% 70%, rgba(255,255,255,.15) 0%, transparent 60%); }
    .blobs { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    .blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: .35; animation: drift linear infinite; }
    .blob-1 { width: 420px; height: 420px; background: radial-gradient(circle, #5bbcb8, transparent); top: -100px; left: -80px; animation-duration: 18s; }
    .blob-2 { width: 300px; height: 300px; background: radial-gradient(circle, #4a7fc1, transparent); bottom: -60px; right: -60px; animation-duration: 22s; animation-delay: -8s; }
    .blob-3 { width: 200px; height: 200px; background: radial-gradient(circle, #fff, transparent); top: 40%; left: 70%; animation-duration: 15s; animation-delay: -4s; opacity: .18; }
    @keyframes drift { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(30px,-20px) scale(1.05); } 66% { transform: translate(-20px,25px) scale(.95); } }
    .orbs { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    .orb { position: absolute; border-radius: 50%; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.3); animation: floatOrb ease-in-out infinite; }
    .orb-1 { width: 14px; height: 14px; top: 18%; left: 15%; animation-duration: 6s; }
    .orb-2 { width: 8px; height: 8px; top: 70%; left: 25%; animation-duration: 8s; animation-delay: -2s; }
    .orb-3 { width: 20px; height: 20px; top: 30%; left: 75%; animation-duration: 7s; animation-delay: -1s; }
    .orb-4 { width: 10px; height: 10px; top: 80%; left: 65%; animation-duration: 9s; animation-delay: -3s; }
    .orb-5 { width: 6px; height: 6px; top: 55%; left: 85%; animation-duration: 5s; animation-delay: -.5s; }
    .orb-6 { width: 16px; height: 16px; top: 12%; left: 55%; animation-duration: 10s; animation-delay: -4s; }
    .orb-7 { width: 9px; height: 9px; top: 88%; left: 40%; animation-duration: 7.5s; animation-delay: -1.5s; }
    @keyframes floatOrb { 0%, 100% { transform: translateY(0); opacity: .6; } 50% { transform: translateY(-18px); opacity: 1; } }
    .grid-overlay { position: fixed; inset: 0; z-index: 1; pointer-events: none; background-image: linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px); background-size: 60px 60px; }

    /* Navigasi */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 18px 36px; }
    .nav-brand { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--text-dark); opacity: .7; cursor: pointer; }
    .nav-brand em { font-style: italic; }
    .nav-links { display: flex; gap: 10px; align-items: center; }
    .nav-btn { padding: 7px 20px; border-radius: 999px; font-family: 'DM Sans', sans-serif; font-size: .8rem; font-weight: 500; cursor: pointer; border: 1px solid rgba(255,255,255,.5); background: rgba(255,255,255,.25); color: var(--text-dark); backdrop-filter: blur(8px); transition: all .2s; letter-spacing: .03em; text-decoration: none; display: inline-block; }
    .nav-btn:hover { background: rgba(255,255,255,.45); }

    /* User chip */
    .user-chip-wrap { position: relative; }
    .user-chip { display: flex; align-items: center; gap: 8px; padding: 5px 14px 5px 6px; border-radius: 999px; background: rgba(255,255,255,.35); border: 1px solid rgba(255,255,255,.6); backdrop-filter: blur(10px); cursor: pointer; transition: background .2s; user-select: none; }
    .user-chip:hover { background: rgba(255,255,255,.5); }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--teal)); display: flex; align-items: center; justify-content: center; font-size: .7rem; font-weight: 600; color: white; flex-shrink: 0; }
    .user-name { font-size: .78rem; font-weight: 500; color: var(--text-dark); letter-spacing: .02em; }
    .user-online { width: 6px; height: 6px; border-radius: 50%; background: #2a9d8f; flex-shrink: 0; }
    .user-chevron { font-size: .6rem; color: var(--text-soft); margin-left: 2px; transition: transform .2s; }
    .user-chip-wrap.open .user-chevron { transform: rotate(180deg); }
    .user-dropdown { position: absolute; top: calc(100% + 10px); right: 0; min-width: 180px; background: rgba(255,255,255,.7); border: 1.5px solid rgba(255,255,255,.85); border-radius: 14px; backdrop-filter: blur(20px); box-shadow: 0 8px 32px rgba(74,127,193,.18); padding: 8px; opacity: 0; pointer-events: none; transform: translateY(-6px); transition: opacity .2s ease, transform .2s ease; z-index: 200; }
    .user-chip-wrap.open .user-dropdown { opacity: 1; pointer-events: all; transform: translateY(0); }
    .dropdown-info { padding: 10px 12px 8px; border-bottom: 1px solid rgba(58,80,104,.1); margin-bottom: 6px; }
    .dropdown-info-name { font-size: .82rem; font-weight: 600; color: var(--text-dark); }
    .dropdown-info-label { font-size: .68rem; color: var(--text-soft); margin-top: 1px; letter-spacing: .03em; }
    .dropdown-item { display: flex; align-items: center; gap: 9px; padding: 9px 12px; border-radius: 9px; font-size: .78rem; font-weight: 500; color: var(--text-mid); cursor: pointer; transition: background .15s; text-decoration: none; }
    .dropdown-item:hover { background: rgba(255,255,255,.7); }
    .dropdown-item.active { background: rgba(74,127,193,.1); color: var(--blue); }
    .dropdown-item.logout { color: #e05252; }
    .dropdown-item.logout:hover { background: rgba(224,82,82,.08); }
    .dropdown-icon { font-size: .85rem; }

    /* Halaman Search */
    .page { position: fixed; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center; }
    .search-wrapper { display: flex; flex-direction: column; align-items: center; gap: 24px; width: 100%; max-width: 680px; padding: 0 24px; animation: fadeUp .6s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .search-brand { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--text-dark); cursor: pointer; transition: opacity .2s; }
    .search-brand:hover { opacity: .7; }
    .search-brand em { font-style: italic; color: var(--blue); }
    .search-box { width: 100%; background: rgba(255,255,255,.5); border: 1.5px solid rgba(255,255,255,.7); border-radius: 18px; backdrop-filter: blur(20px); box-shadow: 0 8px 40px rgba(74,127,193,.15), inset 0 1px 0 rgba(255,255,255,.8); padding: 6px 6px 6px 22px; display: flex; align-items: center; gap: 12px; }
    .search-input { flex: 1; border: none; outline: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 1rem; color: var(--text-dark); font-weight: 400; }
    .search-input::placeholder { color: rgba(58,80,104,.35); }
    .search-btn { padding: 12px 26px; border-radius: 12px; background: var(--text-dark); color: white; border: none; font-family: 'DM Sans', sans-serif; font-size: .88rem; font-weight: 500; cursor: pointer; transition: all .2s; letter-spacing: .03em; }
    .search-btn:hover { background: var(--blue); transform: scale(1.02); }

    .platform-filter { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .pf-btn { display: flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 999px; border: 1.5px solid rgba(255,255,255,.55); background: rgba(255,255,255,.25); backdrop-filter: blur(8px); color: var(--text-mid); font-family: 'DM Sans', sans-serif; font-size: .78rem; font-weight: 500; cursor: pointer; transition: all .2s; letter-spacing: .03em; }
    .pf-btn.active { background: rgba(255,255,255,.6); border-color: rgba(255,255,255,.9); color: var(--text-dark); box-shadow: 0 2px 12px rgba(74,127,193,.15); }
    .pf-btn:hover { background: rgba(255,255,255,.45); }
    .pf-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .most-searched { width: 100%; }
    .most-searched-label { font-size: .68rem; font-weight: 600; letter-spacing: .1em; color: rgba(58,80,104,.5); text-transform: uppercase; margin-bottom: 12px; }
    .most-searched-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .ms-tag { display: flex; align-items: center; gap: 7px; padding: 8px 15px; border-radius: 999px; background: rgba(255,255,255,.28); border: 1px solid rgba(255,255,255,.55); backdrop-filter: blur(8px); color: var(--text-mid); font-size: .78rem; font-weight: 400; letter-spacing: .02em; cursor: pointer; transition: all .2s; user-select: none; }
    .ms-tag:hover { background: rgba(255,255,255,.55); color: var(--text-dark); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(74,127,193,.12); }
    .ms-tag-icon { font-size: .82rem; }

    /* Area Hasil Preview */
    .results-area { width: 100%; background: rgba(255,255,255,.22); border: 1.5px solid rgba(255,255,255,.5); border-radius: 18px; backdrop-filter: blur(14px); padding: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .results-grid { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .result-card { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: rgba(255,255,255,.5); border-radius: 12px; border: 1px solid rgba(255,255,255,.7); animation: fadeUp .4s ease both; }
    .result-card:nth-child(2) { animation-delay: .05s; }
    .result-card:nth-child(3) { animation-delay: .1s; }
    .result-card:nth-child(4) { animation-delay: .15s; }
    .result-left { display: flex; align-items: center; gap: 12px; }
    .result-platform { font-size: .68rem; font-weight: 600; letter-spacing: .06em; padding: 4px 10px; border-radius: 999px; color: white; }
    .result-name { font-size: .85rem; color: var(--text-dark); }
    .result-price { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--text-dark); }
    .result-price.cheapest { color: #2a9d8f; }
    .badge-cheapest { font-size: .62rem; background: #2a9d8f; color: white; padding: 2px 7px; border-radius: 999px; margin-left: 6px; font-weight: 600; }
    .loading-dots { display: flex; gap: 8px; justify-content: center; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(58,80,104,.35); animation: bounce 1.2s ease infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(.8); opacity: .4; } 40% { transform: scale(1.2); opacity: 1; } }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>
  <div class="orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div><div class="orb orb-4"></div><div class="orb orb-5"></div><div class="orb orb-6"></div><div class="orb orb-7"></div></div>
  <div class="grid-overlay"></div>

  <nav>
    <span class="nav-brand" onclick="window.location.href='landing.html'">Banding<em>.in</em></span>
    <div class="nav-links" id="navLinks">
      <!-- Akan diisi oleh JavaScript -->
    </div>
  </nav>

  <div class="page" id="search">
    <div class="search-wrapper">
      <div class="search-brand" onclick="window.location.href='landing.html'">Banding<em>.in</em></div>
      <div class="search-box">
        <input class="search-input" id="searchInput" type="text" placeholder="Cari produk..." />
        <button class="search-btn" onclick="doSearch()">Bandingkan</button>
      </div>
      <div class="platform-filter">
        <button class="pf-btn active" data-platform="all" onclick="togglePlatform(this)"><span class="pf-dot" style="background:#888"></span> Semua</button>
        <button class="pf-btn active" data-platform="tokopedia" onclick="togglePlatform(this)"><span class="pf-dot" style="background:#42b549"></span> Tokopedia</button>
        <button class="pf-btn active" data-platform="shopee" onclick="togglePlatform(this)"><span class="pf-dot" style="background:#ee4d2d"></span> Shopee</button>
        <button class="pf-btn active" data-platform="lazada" onclick="togglePlatform(this)"><span class="pf-dot" style="background:#0f146b"></span> Lazada</button>
        <button class="pf-btn active" data-platform="blibli" onclick="togglePlatform(this)"><span class="pf-dot" style="background:#0095d9"></span> Blibli</button>
      </div>
      <div class="most-searched" id="mostSearched">
        <div class="most-searched-label">🔥 Most Searched Product</div>
        <div class="most-searched-tags">
          <span class="ms-tag" onclick="goToListingPage('iPhone 15')"><span class="ms-tag-icon">📱</span> iPhone 15</span>
          <span class="ms-tag" onclick="goToListingPage('Samsung Galaxy S24')"><span class="ms-tag-icon">📱</span> Samsung Galaxy S24</span>
          <span class="ms-tag" onclick="goToListingPage('Nike Air Max')"><span class="ms-tag-icon">👟</span> Nike Air Max</span>
          <span class="ms-tag" onclick="goToListingPage('Laptop Asus')"><span class="ms-tag-icon">💻</span> Laptop Asus</span>
          <span class="ms-tag" onclick="goToListingPage('AirPods Pro')"><span class="ms-tag-icon">🎧</span> AirPods Pro</span>
          <span class="ms-tag" onclick="goToListingPage('Xiaomi Redmi')"><span class="ms-tag-icon">📱</span> Xiaomi Redmi</span>
          <span class="ms-tag" onclick="goToListingPage('Tas Ransel')"><span class="ms-tag-icon">🎒</span> Tas Ransel</span>
          <span class="ms-tag" onclick="goToListingPage('PS5')"><span class="ms-tag-icon">🎮</span> PS5</span>
        </div>
      </div>
      <div class="results-area" id="resultsArea" style="display:none;"></div>
    </div>
  </div>

  <script>
    // Fungsi untuk update navigasi berdasarkan status login
    function updateNav() {
      const navLinks = document.getElementById('navLinks');
      const isLoggedIn = localStorage.getItem('loggedIn') === 'true';
      const userName = localStorage.getItem('userName') || 'User';
      const userEmail = localStorage.getItem('userEmail') || 'user@example.com';

      function getInitials(name) {
        return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      }

      if (isLoggedIn) {
        // Tampilkan user chip (tanpa Cari Produk) dan About Us
        navLinks.innerHTML = `
          <div class="user-chip-wrap" id="userChipWrap">
            <div class="user-chip" onclick="toggleDropdown()">
              <div class="user-avatar" id="navAvatar">${getInitials(userName)}</div>
              <span class="user-name" id="navName">${userName}</span>
              <div class="user-online"></div>
              <span class="user-chevron">▾</span>
            </div>
            <div class="user-dropdown" id="userDropdown">
              <div class="dropdown-info">
                <div class="dropdown-info-name" id="dropName">${userName}</div>
                <div class="dropdown-info-label" id="dropEmail">${userEmail}</div>
              </div>
              <a class="dropdown-item" href="profile.html">
                <span class="dropdown-icon">👤</span> Profil Saya
              </a>
              <div class="dropdown-item logout" onclick="doLogout()">
                <span class="dropdown-icon">↩</span> Keluar
              </div>
            </div>
          </div>
          <button class="nav-btn" onclick="window.location.href='aboutus.html'">About Us</button>
        `;
      } else {
        // Tampilkan Login dan About Us
        navLinks.innerHTML = `
          <button class="nav-btn" onclick="goToLogin()">Login</button>
          <button class="nav-btn" onclick="window.location.href='aboutus.html'">About Us</button>
        `;
      }
    }

    // Fungsi untuk toggle dropdown
    function toggleDropdown() {
      document.getElementById('userChipWrap').classList.toggle('open');
    }

    // Tutup dropdown jika klik di luar
    document.addEventListener('click', function(e) {
      const wrap = document.getElementById('userChipWrap');
      if (wrap && !wrap.contains(e.target)) {
        wrap.classList.remove('open');
      }
    });

    // Fungsi logout
    function doLogout() {
      localStorage.removeItem('loggedIn');
      localStorage.removeItem('userName');
      localStorage.removeItem('userEmail');
      window.location.reload(); // Refresh untuk update navigasi
    }

    // Fungsi login redirect
    function goToLogin() {
      window.location.href = 'login.html';
    }

    // Panggil updateNav saat halaman dimuat
    window.addEventListener('DOMContentLoaded', updateNav);

    // Fungsi untuk langsung menuju list.html dengan parameter query
    function goToListingPage(query) {
      window.location.href = 'list.html?q=' + encodeURIComponent(query);
    }

    // Toggle platform
    function togglePlatform(btn) {
      const p = btn.dataset.platform;
      if (p === 'all') {
        document.querySelectorAll('.pf-btn').forEach(b => b.classList.add('active'));
      } else {
        btn.classList.toggle('active');
        const allActive = [...document.querySelectorAll('.pf-btn[data-platform!="all"]')].every(b => b.classList.contains('active'));
        document.querySelector('.pf-btn[data-platform="all"]').classList.toggle('active', allActive);
      }
    }

    // Data dummy produk
    const mockData = {
      platforms: {
        tokopedia: { color: '#42b549', label: 'Tokopedia' },
        shopee:    { color: '#ee4d2d', label: 'Shopee' },
        lazada:    { color: '#0f146b', label: 'Lazada' },
        blibli:    { color: '#0095d9', label: 'Blibli' }
      },
      products: [
        { name: 'iPhone 15',       prices: { tokopedia: 12999000, shopee: 12749000, lazada: 12899000, blibli: 13100000 } },
        { name: 'Samsung Galaxy S24',  prices: { tokopedia: 8499000,  shopee: 8299000,  lazada: 8350000,  blibli: 8600000  } },
        { name: 'Nike Air Max',    prices: { tokopedia: 1850000,  shopee: 1799000,  lazada: 1920000,  blibli: 1875000  } },
        { name: 'Laptop Asus',     prices: { tokopedia: 9999000,  shopee: 9750000,  lazada: 9850000,  blibli: 10200000 } },
        { name: 'AirPods Pro',     prices: { tokopedia: 3499000,  shopee: 3299000,  lazada: 3350000,  blibli: 3600000  } },
        { name: 'Xiaomi Redmi',    prices: { tokopedia: 2199000,  shopee: 2099000,  lazada: 2150000,  blibli: 2299000  } },
        { name: 'Tas Ransel',      prices: { tokopedia: 350000,   shopee: 299000,   lazada: 320000,   blibli: 375000   } },
        { name: 'PS5',             prices: { tokopedia: 8999000,  shopee: 8799000,  lazada: 8850000,  blibli: 9100000  } }
      ]
    };

    // Fungsi pencarian (menampilkan preview)
    function doSearch() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;

      const area = document.getElementById('resultsArea');
      const ms = document.getElementById('mostSearched');
      ms.style.display = 'none';
      area.style.display = 'flex';
      area.innerHTML = '<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

      setTimeout(() => {
        const ap = [...document.querySelectorAll('.pf-btn[data-platform!="all"].active')].map(b => b.dataset.platform);
        if (!ap.length) {
          area.innerHTML = '<div style="text-align:center;color:rgba(58,80,104,.5);font-size:.82rem;">Pilih minimal satu platform dulu ya 😊</div>';
          return;
        }

        const match = mockData.products.find(p => p.name.toLowerCase().includes(query.toLowerCase())) || mockData.products[0];
        const entries = ap.map(p => ({ platform: p, price: match.prices[p] })).sort((a, b) => a.price - b.price);
        const minPrice = entries[0].price;

        area.innerHTML = `
          <div class="results-grid">
            ${entries.map(e => `
              <div class="result-card">
                <div class="result-left">
                  <span class="result-platform" style="background:${mockData.platforms[e.platform].color}">${mockData.platforms[e.platform].label}</span>
                  <span class="result-name">${match.name}</span>
                </div>
                <div style="display:flex;align-items:center">
                  <span class="result-price ${e.price === minPrice ? 'cheapest' : ''}">Rp ${e.price.toLocaleString('id-ID')}</span>
                  ${e.price === minPrice ? '<span class="badge-cheapest">TERMURAH</span>' : ''}
                </div>
              </div>`).join('')}
            <div style="text-align:right;padding-top:8px;">
              <button
                onclick="goToListingPage('${match.name}')"
                style="padding:8px 20px;border-radius:999px;background:var(--text-dark);color:white;border:none;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:500;cursor:pointer;letter-spacing:.04em;"
                onmouseover="this.style.background='var(--blue)'"
                onmouseout="this.style.background='var(--text-dark)'">
                Lihat Semua Hasil →
              </button>
            </div>
          </div>`;
      }, 900);
    }

    // Enter untuk mencari
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
  </script>
</body>
</html>
