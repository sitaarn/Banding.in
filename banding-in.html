<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Banding.in — Find Your Best Prices</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --text-dark: #1e2d3a; --text-mid: #3a5068; --text-soft: #5a7a90;
      --blue: #4a7fc1; --teal: #5bbcb8;
    }
    html, body { height: 100%; font-family: 'DM Sans', sans-serif; overflow: hidden; }
    .bg { position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,#c8dce8 0%,#a0c8d4 40%,#88bcc8 70%,#7ab0c4 100%); }
    .bg::before { content:'';position:absolute;inset:0;background:radial-gradient(ellipse 700px 500px at 20% 80%,rgba(91,188,184,.28) 0%,transparent 70%),radial-gradient(ellipse 500px 400px at 80% 20%,rgba(74,127,193,.22) 0%,transparent 70%),radial-gradient(ellipse 400px 300px at 60% 70%,rgba(255,255,255,.15) 0%,transparent 60%); }
    .blobs{position:fixed;inset:0;z-index:1;pointer-events:none;}
    .blob{position:absolute;border-radius:50%;filter:blur(60px);opacity:.35;animation:drift linear infinite;}
    .blob-1{width:420px;height:420px;background:radial-gradient(circle,#5bbcb8,transparent);top:-100px;left:-80px;animation-duration:18s;}
    .blob-2{width:300px;height:300px;background:radial-gradient(circle,#4a7fc1,transparent);bottom:-60px;right:-60px;animation-duration:22s;animation-delay:-8s;}
    .blob-3{width:200px;height:200px;background:radial-gradient(circle,#fff,transparent);top:40%;left:70%;animation-duration:15s;animation-delay:-4s;opacity:.18;}
    @keyframes drift{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(30px,-20px) scale(1.05);}66%{transform:translate(-20px,25px) scale(.95);}}
    .orbs{position:fixed;inset:0;z-index:1;pointer-events:none;}
    .orb{position:absolute;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);animation:floatOrb ease-in-out infinite;}
    .orb-1{width:14px;height:14px;top:18%;left:15%;animation-duration:6s;}
    .orb-2{width:8px;height:8px;top:70%;left:25%;animation-duration:8s;animation-delay:-2s;}
    .orb-3{width:20px;height:20px;top:30%;left:75%;animation-duration:7s;animation-delay:-1s;}
    .orb-4{width:10px;height:10px;top:80%;left:65%;animation-duration:9s;animation-delay:-3s;}
    .orb-5{width:6px;height:6px;top:55%;left:85%;animation-duration:5s;animation-delay:-.5s;}
    .orb-6{width:16px;height:16px;top:12%;left:55%;animation-duration:10s;animation-delay:-4s;}
    .orb-7{width:9px;height:9px;top:88%;left:40%;animation-duration:7.5s;animation-delay:-1.5s;}
    @keyframes floatOrb{0%,100%{transform:translateY(0);opacity:.6;}50%{transform:translateY(-18px);opacity:1;}}
    .grid-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px);background-size:60px 60px;}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 36px;}
    .nav-brand{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--text-dark);opacity:.7;}
    .nav-links{display:flex;gap:10px;}
    .nav-btn{padding:7px 20px;border-radius:999px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.5);background:rgba(255,255,255,.25);color:var(--text-dark);backdrop-filter:blur(8px);transition:all .2s;letter-spacing:.03em;}
    .nav-btn:hover{background:rgba(255,255,255,.45);}
    .page{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;transition:opacity .5s ease,transform .5s ease;}
    .page.hidden{opacity:0;pointer-events:none;transform:scale(.97);}
    /* LANDING */
    .landing-center{display:flex;flex-direction:column;align-items:center;gap:28px;animation:fadeUp .9s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
    .platform-pills{display:flex;gap:10px;animation:fadeUp .9s .1s ease both;}
    .pill{padding:6px 14px;border-radius:999px;font-size:.72rem;font-weight:500;letter-spacing:.04em;background:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.5);color:var(--text-mid);backdrop-filter:blur(6px);}
    .main-card{position:relative;padding:34px 58px;border-radius:24px;border:1.5px solid rgba(255,255,255,.6);background:rgba(255,255,255,.2);backdrop-filter:blur(16px);cursor:pointer;transition:all .3s ease;box-shadow:0 8px 40px rgba(74,127,193,.15),inset 0 1px 0 rgba(255,255,255,.5);animation:fadeUp .9s .2s ease both;}
    .main-card:hover{background:rgba(255,255,255,.32);box-shadow:0 16px 60px rgba(74,127,193,.25),inset 0 1px 0 rgba(255,255,255,.6);transform:translateY(-3px);}
    .main-card::after{content:'Klik untuk mulai →';position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);font-size:.72rem;color:rgba(58,80,104,.6);white-space:nowrap;letter-spacing:.05em;font-weight:400;}
    .brand-name{font-family:'DM Serif Display',serif;font-size:3.2rem;color:var(--text-dark);letter-spacing:-.01em;line-height:1;}
    .brand-name em{font-style:italic;color:var(--blue);}
    .tagline{font-size:.88rem;color:var(--text-soft);font-weight:300;letter-spacing:.08em;text-align:center;animation:fadeUp .9s .35s ease both;}
    .stats-row{display:flex;gap:32px;animation:fadeUp .9s .45s ease both;}
    .stat{text-align:center;}
    .stat-number{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--text-dark);line-height:1;}
    .stat-label{font-size:.7rem;color:var(--text-soft);letter-spacing:.06em;margin-top:3px;}
    .stat-divider{width:1px;background:rgba(58,80,104,.2);align-self:stretch;}
    /* SEARCH */
    .search-wrapper{display:flex;flex-direction:column;align-items:center;gap:24px;width:100%;max-width:680px;padding:0 24px;animation:fadeUp .6s ease both;}
    .search-brand{font-family:'DM Serif Display',serif;font-size:1.8rem;color:var(--text-dark);cursor:pointer;transition:opacity .2s;}
    .search-brand:hover{opacity:.7;}
    .search-brand em{font-style:italic;color:var(--blue);}
    .search-box{width:100%;background:rgba(255,255,255,.5);border:1.5px solid rgba(255,255,255,.7);border-radius:18px;backdrop-filter:blur(20px);box-shadow:0 8px 40px rgba(74,127,193,.15),inset 0 1px 0 rgba(255,255,255,.8);padding:6px 6px 6px 22px;display:flex;align-items:center;gap:12px;}
    .search-input{flex:1;border:none;outline:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:1rem;color:var(--text-dark);font-weight:400;}
    .search-input::placeholder{color:rgba(58,80,104,.35);}
    .search-btn{padding:12px 26px;border-radius:12px;background:var(--text-dark);color:white;border:none;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;transition:all .2s;letter-spacing:.03em;}
    .search-btn:hover{background:var(--blue);transform:scale(1.02);}
    .platform-filter{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
    .pf-btn{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:999px;border:1.5px solid rgba(255,255,255,.55);background:rgba(255,255,255,.25);backdrop-filter:blur(8px);color:var(--text-mid);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .2s;letter-spacing:.03em;}
    .pf-btn.active{background:rgba(255,255,255,.6);border-color:rgba(255,255,255,.9);color:var(--text-dark);box-shadow:0 2px 12px rgba(74,127,193,.15);}
    .pf-btn:hover{background:rgba(255,255,255,.45);}
    .pf-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    /* MOST SEARCHED */
    .most-searched{width:100%;}
    .most-searched-label{font-size:.68rem;font-weight:600;letter-spacing:.1em;color:rgba(58,80,104,.5);text-transform:uppercase;margin-bottom:12px;}
    .most-searched-tags{display:flex;flex-wrap:wrap;gap:8px;}
    .ms-tag{display:flex;align-items:center;gap:7px;padding:8px 15px;border-radius:999px;background:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.55);backdrop-filter:blur(8px);color:var(--text-mid);font-size:.78rem;font-weight:400;letter-spacing:.02em;cursor:pointer;transition:all .2s;user-select:none;}
    .ms-tag:hover{background:rgba(255,255,255,.55);color:var(--text-dark);transform:translateY(-2px);box-shadow:0 4px 16px rgba(74,127,193,.12);}
    .ms-tag-icon{font-size:.82rem;}
    /* RESULTS */
    .results-area{width:100%;background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.5);border-radius:18px;backdrop-filter:blur(14px);padding:24px;display:flex;align-items:center;justify-content:center;}
    .results-grid{display:flex;flex-direction:column;gap:10px;width:100%;}
    .result-card{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(255,255,255,.5);border-radius:12px;border:1px solid rgba(255,255,255,.7);animation:fadeUp .4s ease both;}
    .result-card:nth-child(2){animation-delay:.05s;}
    .result-card:nth-child(3){animation-delay:.1s;}
    .result-card:nth-child(4){animation-delay:.15s;}
    .result-left{display:flex;align-items:center;gap:12px;}
    .result-platform{font-size:.68rem;font-weight:600;letter-spacing:.06em;padding:4px 10px;border-radius:999px;color:white;}
    .result-name{font-size:.85rem;color:var(--text-dark);}
    .result-price{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--text-dark);}
    .result-price.cheapest{color:#2a9d8f;}
    .badge-cheapest{font-size:.62rem;background:#2a9d8f;color:white;padding:2px 7px;border-radius:999px;margin-left:6px;font-weight:600;}
    .loading-dots{display:flex;gap:8px;justify-content:center;}
    .dot{width:8px;height:8px;border-radius:50%;background:rgba(58,80,104,.35);animation:bounce 1.2s ease infinite;}
    .dot:nth-child(2){animation-delay:.2s;}
    .dot:nth-child(3){animation-delay:.4s;}
    @keyframes bounce{0%,80%,100%{transform:scale(.8);opacity:.4;}40%{transform:scale(1.2);opacity:1;}}
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>
  <div class="orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div><div class="orb orb-4"></div><div class="orb orb-5"></div><div class="orb orb-6"></div><div class="orb orb-7"></div></div>
  <div class="grid-overlay"></div>
  <nav>
    <span class="nav-brand">Banding<em style="font-family:'DM Serif Display',serif;font-style:italic">.in</em></span>
    <div class="nav-links">
      <button class="nav-btn" onclick="goToSearch()">Login</button>
      <button class="nav-btn">About Us</button>
    </div>
  </nav>
  <!-- LANDING -->
  <div class="page" id="landing">
    <div class="landing-center">
      <div class="platform-pills">
        <span class="pill">Tokopedia</span><span class="pill">Shopee</span><span class="pill">Lazada</span><span class="pill">Blibli</span>
      </div>
      <div class="main-card" onclick="goToSearch()">
        <div class="brand-name">Banding<em>.in</em></div>
      </div>
      <p class="tagline">find your best prices.</p>
      <div class="stats-row">
        <div class="stat"><div class="stat-number">4</div><div class="stat-label">PLATFORM</div></div>
        <div class="stat-divider"></div>
        <div class="stat"><div class="stat-number">Real‑time</div><div class="stat-label">PERBANDINGAN</div></div>
        <div class="stat-divider"></div>
        <div class="stat"><div class="stat-number">Gratis</div><div class="stat-label">SELAMANYA</div></div>
      </div>
    </div>
  </div>
  <!-- SEARCH -->
  <div class="page hidden" id="search">
    <div class="search-wrapper">
      <div class="search-brand" onclick="goToLanding()">Banding<em>.in</em></div>
      <div class="search-box">
        <input class="search-input" id="searchInput" type="text" placeholder="" />
        <button class="search-btn" onclick="doSearch()">Bandingkan</button>
      </div>
      <div class="platform-filter">
        <button class="pf-btn active" data-platform="all" onclick="togglePlatform(this)"><span class="pf-dot" style="background:#888"></span> Semua</button>
        <button class="pf-btn active" data-platform="tokopedia" onclick="togglePlatform(this)"><span class="pf-dot" style="background:#42b549"></span> Tokopedia</button>
        <button class="pf-btn active" data-platform="shopee" onclick="togglePlatform(this)"><span class="pf-dot" style="background:#ee4d2d"></span> Shopee</button>
        <button class="pf-btn active" data-platform="lazada" onclick="togglePlatform(this)"><span class="pf-dot" style="background:#0f146b"></span> Lazada</button>
        <button class="pf-btn active" data-platform="blibli" onclick="togglePlatform(this)"><span class="pf-dot" style="background:#0095d9"></span> Blibli</button>
      </div>
      <div class="most-searched" id="mostSearched">
        <div class="most-searched-label">🔥 Most Searched Product</div>
        <div class="most-searched-tags">
          <span class="ms-tag" onclick="fillSearch('iPhone 15')"><span class="ms-tag-icon">📱</span> iPhone 15</span>
          <span class="ms-tag" onclick="fillSearch('Samsung Galaxy S24')"><span class="ms-tag-icon">📱</span> Samsung Galaxy S24</span>
          <span class="ms-tag" onclick="fillSearch('Nike Air Max')"><span class="ms-tag-icon">👟</span> Nike Air Max</span>
          <span class="ms-tag" onclick="fillSearch('Laptop Asus')"><span class="ms-tag-icon">💻</span> Laptop Asus</span>
          <span class="ms-tag" onclick="fillSearch('AirPods Pro')"><span class="ms-tag-icon">🎧</span> AirPods Pro</span>
          <span class="ms-tag" onclick="fillSearch('Xiaomi Redmi')"><span class="ms-tag-icon">📱</span> Xiaomi Redmi</span>
          <span class="ms-tag" onclick="fillSearch('Tas Ransel')"><span class="ms-tag-icon">🎒</span> Tas Ransel</span>
          <span class="ms-tag" onclick="fillSearch('PS5')"><span class="ms-tag-icon">🎮</span> PS5</span>
        </div>
      </div>
      <div class="results-area" id="resultsArea" style="display:none;"></div>
    </div>
  </div>
  <script>
    function goToSearch(){document.getElementById('landing').classList.add('hidden');document.getElementById('search').classList.remove('hidden');setTimeout(()=>document.getElementById('searchInput').focus(),300);}
    function goToLanding(){document.getElementById('search').classList.add('hidden');document.getElementById('landing').classList.remove('hidden');document.getElementById('resultsArea').style.display='none';document.getElementById('mostSearched').style.display='block';document.getElementById('searchInput').value='';}
    function togglePlatform(btn){const p=btn.dataset.platform;if(p==='all'){document.querySelectorAll('.pf-btn').forEach(b=>b.classList.add('active'));}else{btn.classList.toggle('active');const allActive=[...document.querySelectorAll('.pf-btn[data-platform!="all"]')].every(b=>b.classList.contains('active'));document.querySelector('.pf-btn[data-platform="all"]').classList.toggle('active',allActive);}}
    function fillSearch(q){document.getElementById('searchInput').value=q;doSearch();}
    const mockData={platforms:{tokopedia:{color:'#42b549',label:'Tokopedia'},shopee:{color:'#ee4d2d',label:'Shopee'},lazada:{color:'#0f146b',label:'Lazada'},blibli:{color:'#0095d9',label:'Blibli'}},products:[{name:'iPhone 15',prices:{tokopedia:12999000,shopee:12749000,lazada:12899000,blibli:13100000}},{name:'Samsung Galaxy',prices:{tokopedia:8499000,shopee:8299000,lazada:8350000,blibli:8600000}},{name:'Nike Air Max',prices:{tokopedia:1850000,shopee:1799000,lazada:1920000,blibli:1875000}},{name:'Laptop Asus',prices:{tokopedia:9999000,shopee:9750000,lazada:9850000,blibli:10200000}},{name:'AirPods Pro',prices:{tokopedia:3499000,shopee:3299000,lazada:3350000,blibli:3600000}},{name:'Xiaomi Redmi',prices:{tokopedia:2199000,shopee:2099000,lazada:2150000,blibli:2299000}},{name:'Tas Ransel',prices:{tokopedia:350000,shopee:299000,lazada:320000,blibli:375000}},{name:'PS5',prices:{tokopedia:8999000,shopee:8799000,lazada:8850000,blibli:9100000}}]};
    function doSearch(){const query=document.getElementById('searchInput').value.trim();if(!query)return;const area=document.getElementById('resultsArea');const ms=document.getElementById('mostSearched');ms.style.display='none';area.style.display='flex';area.innerHTML='<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';setTimeout(()=>{const ap=[...document.querySelectorAll('.pf-btn[data-platform!="all"].active')].map(b=>b.dataset.platform);if(!ap.length){area.innerHTML='<div style="text-align:center;color:rgba(58,80,104,.5);font-size:.82rem;">Pilih minimal satu platform dulu ya 😊</div>';return;}const match=mockData.products.find(p=>p.name.toLowerCase().includes(query.toLowerCase()))||mockData.products[0];const entries=ap.map(p=>({platform:p,price:match.prices[p]})).sort((a,b)=>a.price-b.price);const minPrice=entries[0].price;area.innerHTML=`<div class="results-grid">${entries.map(e=>`<div class="result-card"><div class="result-left"><span class="result-platform" style="background:${mockData.platforms[e.platform].color}">${mockData.platforms[e.platform].label}</span><span class="result-name">${match.name}</span></div><div style="display:flex;align-items:center"><span class="result-price ${e.price===minPrice?'cheapest':''}"">Rp ${e.price.toLocaleString('id-ID')}</span>${e.price===minPrice?'<span class="badge-cheapest">TERMURAH</span>':''}</div></div>`).join('')}</div>`;},900);}
    document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!document.getElementById('search').classList.contains('hidden'))doSearch();});
  </script>
</body>
</html>
